# =============================================================================
# EKS cluster config for the Dagster platform.
#
# IMPORTANT: a default StorageClass canNOT be expressed here -- eksctl has no
# StorageClass field, and the EBS CSI addon does not create one. EKS only
# pre-creates the broken in-tree `gp2`. After the cluster + addons are up, apply
# the companion manifest and demote gp2:
#     kubectl apply -f .scratch/storageclass-gp3.yaml
#     kubectl patch storageclass gp2 -p \
#       '{"metadata":{"annotations":{"storageclass.kubernetes.io/is-default-class":"false"}}}'
# =============================================================================
apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig
availabilityZones:
  - ${AWS_REGION}a
  - ${AWS_REGION}b
  - ${AWS_REGION}c
metadata:
  name: ${EKS_CLUSTER_NAME}
  region: ${AWS_REGION}
  version: "1.34"
  tags:
    created-by: dagster-platform
    env: dev
iam:
  withOIDC: true        # MUST be true -- every IRSA role (EBS CSI, Dagster
                        # locations, external-secrets) depends on it. Verify
                        # after create: `aws eks describe-cluster ... identity.oidc`
vpc:
  cidr: 10.42.0.0/16
  clusterEndpoints:
    privateAccess: true
    publicAccess: true
managedNodeGroups:
  - name: default
    desiredCapacity: 3
    minSize: 3
    maxSize: 6
    instanceType: m5.large
    privateNetworking: true
    # No releaseVersion pin -- let the node AMI track the cluster version (1.34)
    # so an upgrade doesn't leave nodes stranded on an older minor.
    updateConfig:
      maxUnavailablePercentage: 50
    labels:
      workshop-default: "yes"
addons:
  # Core networking
  - name: vpc-cni
    version: latest
    configurationValues: '{"env":{"ENABLE_PREFIX_DELEGATION":"true","ENABLE_POD_ENI":"true","POD_SECURITY_GROUP_ENFORCING_MODE":"standard"},"enableNetworkPolicy":"true"}'
    resolveConflicts: overwrite

  - name: coredns
    version: latest
    resolveConflicts: overwrite

  - name: kube-proxy
    version: latest
    resolveConflicts: overwrite

  # EBS CSI driver — REQUIRED on EKS 1.23+.
  # The in-tree aws-ebs provisioner is removed; without this addon any PVC
  # (bundled Postgres, etc.) will stay Pending indefinitely.
  # wellKnownPolicies auto-creates the IRSA role — but ONLY works if withOIDC
  # is true above. If OIDC is missing the controller CrashLoops with no perms.
  - name: aws-ebs-csi-driver
    version: latest
    resolveConflicts: overwrite
    wellKnownPolicies:
      ebsCSIController: true

  # Pod Identity Agent — modern IRSA alternative; keep alongside withOIDC: true.
  - name: eks-pod-identity-agent
    version: latest
    resolveConflicts: overwrite

  # Metrics Server — required for HPA and `kubectl top`.
  - name: metrics-server
    version: latest
    resolveConflicts: overwrite

accessConfig:
  authenticationMode: API
  bootstrapClusterCreatorAdminPermissions: true
