apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig
availabilityZones:
  - ${AWS_REGION}a
  - ${AWS_REGION}b
  - ${AWS_REGION}c
metadata:
  name: ${EKS_CLUSTER_NAME}
  region: ${AWS_REGION}
  version: "1.33"
  tags:
    created-by: dagster-platform
    env: dev
iam:
  withOIDC: true
vpc:
  cidr: 10.42.0.0/16
  clusterEndpoints:
    privateAccess: true
    publicAccess: true
managedNodeGroups:
  - name: default
    desiredCapacity: 3
    minSize: 3
    maxSize: 6
    instanceType: m5.large
    privateNetworking: true
    releaseVersion: "1.33.0-20250704"
    updateConfig:
      maxUnavailablePercentage: 50
    labels:
      workshop-default: "yes"
addons:
  # Core networking
  - name: vpc-cni
    version: latest
    configurationValues: '{"env":{"ENABLE_PREFIX_DELEGATION":"true","ENABLE_POD_ENI":"true","POD_SECURITY_GROUP_ENFORCING_MODE":"standard"},"enableNetworkPolicy":"true"}'
    resolveConflicts: overwrite

  - name: coredns
    version: latest
    resolveConflicts: overwrite

  - name: kube-proxy
    version: latest
    resolveConflicts: overwrite

  # EBS CSI driver — REQUIRED on EKS 1.23+.
  # The in-tree aws-ebs provisioner is removed; without this addon any PVC
  # (bundled Postgres, etc.) will stay Pending indefinitely.
  # wellKnownPolicies auto-creates the IRSA role — no manual aws iam needed.
  - name: aws-ebs-csi-driver
    version: latest
    resolveConflicts: overwrite
    wellKnownPolicies:
      ebsCSIController: true

  # Pod Identity Agent — modern IRSA alternative; keep alongside withOIDC: true.
  - name: eks-pod-identity-agent
    version: latest
    resolveConflicts: overwrite

  # Metrics Server — required for HPA and `kubectl top`.
  - name: metrics-server
    version: latest
    resolveConflicts: overwrite

accessConfig:
  authenticationMode: API
  bootstrapClusterCreatorAdminPermissions: true
