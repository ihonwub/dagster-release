# =============================================================================
# Default StorageClass backed by the EBS CSI driver (provisioner ebs.csi.aws.com).
#
# WHY this is a separate file: eksctl ClusterConfig cannot define a StorageClass,
# and the aws-ebs-csi-driver addon does not create one. EKS only pre-creates the
# legacy `gp2` class which uses the REMOVED in-tree provisioner
# (kubernetes.io/aws-ebs) and cannot bind volumes on EKS 1.23+.
#
# Apply AFTER the cluster + EBS CSI addon are up, then demote the broken gp2:
#     kubectl apply -f .scratch/storageclass-gp3.yaml
#     kubectl patch storageclass gp2 -p \
#       '{"metadata":{"annotations":{"storageclass.kubernetes.io/is-default-class":"false"}}}'
# =============================================================================
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gp3
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: ebs.csi.aws.com
volumeBindingMode: WaitForFirstConsumer   # bind only once a pod schedules (AZ-aware)
allowVolumeExpansion: true
parameters:
  type: gp3
  encrypted: "true"
