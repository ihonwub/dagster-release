# =============================================================================
# DEV cluster settings for the app-of-apps chart.
#
# With one explicit template per app under templates/, this file is small: it
# just carries shared settings + per-app on/off switches. The bootstrap
# ApplicationSet selects THIS file (vs values-preprod.yaml) using the cluster's
# `env` label.
# =============================================================================

env: dev                                          # -> each app loads values-dev.yaml from its chart
repoURL: https://github.com/ihonwub/dagster-release.git
targetRevision: main
project: data-platform
argocdNamespace: argocd                           # where the child Application objects live
destinationServer: https://kubernetes.default.svc # this Argo manages its own cluster

# Per-app on/off. Flip to false to keep an app out of this environment.
# DEMO bring-up: external-secrets + karpenter are OFF. The workshop node group
# already has capacity (no karpenter needed) and we use the bundled Postgres
# instead of RDS-via-ESO. Re-enable both for a real environment.
externalSecrets:      { enabled: false }
karpenter:            { enabled: false }
reloader:             { enabled: true }
dagsterInstance:      { enabled: true }
dagsterCodeLocations: { enabled: true }
dagsterWorkspace:     { enabled: true }
