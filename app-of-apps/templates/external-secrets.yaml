{{- /*
  ArgoCD Application for External Secrets.

  This is the SHAPE every app file in this folder follows:
    - gated by its `.Values.<app>.enabled` switch
    - a sync-wave that fixes ordering (lower = earlier)
    - source.path -> the FULL wrapper chart in apps/<app>/
    - helm.valueFiles -> values-<env>.yaml, so the chart gets the right env
  External Secrets runs in a NEGATIVE wave so secret access exists before the
  apps that need it (e.g. the Dagster control plane wiring RDS creds).
*/ -}}
{{- if .Values.externalSecrets.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: {{ .Values.argocdNamespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.project }}
  destination:
    server: {{ .Values.destinationServer }}
    namespace: external-secrets
  source:
    repoURL: {{ .Values.repoURL }}
    targetRevision: {{ .Values.targetRevision }}
    path: apps/external-secrets
    helm:
      valueFiles:
        - values-{{ .Values.env }}.yaml
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
{{- end }}
